name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Zero-dependency suites
      - name: Memory tests
        working-directory: memory
        run: node test.js

      - name: Agent tests
        working-directory: agent
        run: node test.js

      - name: Routines tests
        working-directory: routines
        run: node test.js

      # Suites with dependencies
      - name: MCP server (install + smoke)
        working-directory: mcp-server
        run: |
          npm ci || npm install
          npm run smoke

      - name: Backend (install + tests)
        working-directory: src/backend
        run: |
          npm ci || npm install
          node test.js

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the BLAST image
        run: docker build -t umhlawati-blast .
